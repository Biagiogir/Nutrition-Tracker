<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Nutrition & Macro Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background-color: #020617;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
    }
    .dashboard-card {
      width: 100%;
      max-width: 420px;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin-top: 8px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
    }
    .date-control {
      display: flex;
      align-items: center;
      gap: 4px;
      background-color: rgba(2, 6, 23, 0.6);
      padding: 4px;
      border: 1px solid #1e293b;
      border-radius: 12px;
    }
    .date-btn {
      background: none;
      border: none;
      color: #94a3b8;
      padding: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    #currentDateDisplay {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      min-width: 70px;
      text-align: center;
    }
    .ring-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0;
      position: relative;
    }
    .svg-ring-box {
      width: 160px;
      height: 160px;
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: transparent;
      stroke: #1e293b;
      stroke-width: 9;
    }
    .ring-fill {
      fill: transparent;
      stroke: #14b8a6;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s ease;
    }
    .ring-center-text {
      position: absolute;
      text-align: center;
    }
    #totalCalories {
      font-size: 32px;
      font-weight: 800;
      color: #ffffff;
    }
    .kcal-sub {
      font-size: 9px;
      color: #94a3b8;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .food-list {
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
      border-top: 1px solid #1e293b;
      border-bottom: 1px solid #1e293b;
      padding: 10px 0;
    }
    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: #64748b;
      font-size: 12px;
    }
    .meal-item {
      background-color: rgba(2, 6, 23, 0.4);
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .macro-gauge-card {
      background-color: rgba(2, 6, 23, 0.6);
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 14px;
    }
    .gauge-wrapper { margin-bottom: 8px; }
    .gauge-label-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
    .track-bg { width: 100%; height: 6px; background-color: #1e293b; border-radius: 100px; overflow: hidden; }
    .track-fill { height: 100%; width: 0%; transition: width 0.3s ease; }
    .fill-p { background-color: #10b981; }
    .fill-c { background-color: #f59e0b; }
    .fill-f { background-color: #ef4444; }
    
    .goal-settings-panel {
      margin-top: 14px;
      border-top: 1px solid #1e293b;
      padding-top: 14px;
    }
    .text-input-field {
      width: 100%;
      background-color: #020617;
      color: #ffffff;
      font-size: 13px;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }
    .dashboard-footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    .btn-action-secondary, .btn-action-primary {
      padding: 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-action-secondary { background-color: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-action-primary { background-color: #14b8a6; color: #020617; }
    
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(2, 6, 23, 0.85);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-sheet {
      background-color: #0f172a;
      width: 100%;
      max-width: 500px;
      border-radius: 24px 24px 0 0;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="dashboard-card">
    <div class="header-row">
      <h1>Macro Tracker</h1>
      <div class="date-control">
        <button id="prevDateBtn" class="date-btn">◀</button>
        <span id="currentDateDisplay">Today</span>
        <button id="nextDateBtn" class="date-btn">▶</button>
      </div>
    </div>

    <div class="ring-container">
      <svg class="svg-ring-box">
        <circle cx="80" cy="80" r="70" class="ring-bg" />
        <circle cx="80" cy="80" r="70" class="ring-fill" id="calorieProgressBar" stroke-dasharray="440" stroke-dashoffset="440" />
      </svg>
      <div class="ring-center-text">
        <span id="totalCalories">0</span>
        <div class="kcal-sub">kcal logged</div>
      </div>
    </div>

    <div class="food-list" id="mealsListContainer"></div>

    <div class="macro-gauge-card">
      <div style="font-size:12px; display:flex; justify-content:space-between; margin-bottom:10px;">
        <span>Daily Goal:</span>
        <input type="number" id="goalInput" value="1800" style="width:60px; background:none; border:none; color:#fff; font-weight:700; text-align:right;">
      </div>
      
      <div class="gauge-wrapper">
        <div class="gauge-label-row"><span>Protein</span><span id="proteinLabel">0g</span></div>
        <div class="track-bg"><div class="track-fill fill-p" id="proteinBar"></div></div>
      </div>
      <div class="gauge-wrapper">
        <div class="gauge-label-row"><span>Carbs</span><span id="carbsLabel">0g</span></div>
        <div class="track-bg"><div class="track-fill fill-c" id="carbsBar"></div></div>
      </div>
      <div class="gauge-wrapper">
        <div class="gauge-label-row"><span>Fat</span><span id="fatLabel">0g</span></div>
        <div class="track-bg"><div class="track-fill fill-f" id="fatBar"></div></div>
      </div>
    </div>

    <div class="goal-settings-panel">
      <label style="font-size: 10px; color: #94a3b8; display:block; margin-bottom:4px;">GEMINI API KEY</label>
      <input type="text" id="apiKeyInput" placeholder="Paste Gemini key here" class="text-input-field">
    </div>

    <div class="dashboard-footer-grid">
      <button id="openHistoryBtn" class="btn-action-secondary">History Vault</button>
      <button id="openAddModalBtn" class="btn-action-primary">+ Add Item</button>
    </div>
  </div>

  <div id="addMealModal" class="modal-overlay">
    <div class="modal-sheet">
      <h3 style="margin-bottom:12px; color:#fff;">Add Quick Meal</h3>
      <input type="text" id="recipeMealName" placeholder="Meal Name (e.g. Rice & Chicken)" class="text-input-field" style="margin-bottom:8px;">
      <input type="number" id="recipeCalories" placeholder="Calories" class="text-input-field" style="margin-bottom:12px;">
      <div style="display:flex; gap:10px;">
        <button id="cancelAddModalBtn" class="btn-action-secondary" style="flex:1;">Cancel</button>
        <button id="mainActionBtn" class="btn-action-primary" style="flex:1;">Save Item</button>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal-overlay">
    <div class="modal-sheet">
      <h3 style="margin-bottom:12px; color:#fff;">Logs Vault</h3>
      <div id="historyListContainer" style="max-height:200px; overflow-y:auto; margin-bottom:12px;"></div>
      <button id="closeHistoryModalBtn" class="btn-action-secondary" style="width:100%;">Close</button>
    </div>
  </div>

  <script>
    var currentSelectedDate = new Date().toISOString().split('T')[0];
    var meals = [];
    var calorieGoal = 1800;

    function initApplication() {
      document.getElementById('prevDateBtn').onclick = function() { changeDate(-1); };
      document.getElementById('nextDateBtn').onclick = function() { changeDate(1); };
      document.getElementById('openAddModalBtn').onclick = function() { document.getElementById('addMealModal').classList.add('active'); };
      document.getElementById('cancelAddModalBtn').onclick = function() { document.getElementById('addMealModal').classList.remove('active'); };
      document.getElementById('closeHistoryModalBtn').onclick = function() { document.getElementById('historyModal').classList.remove('active'); };
      document.getElementById('openHistoryBtn').onclick = openHistoryModal;
      document.getElementById('mainActionBtn').onclick = saveQuickMeal;

      // Sync Key
      var savedKey = localStorage.getItem("gemini_api_key") || "";
      document.getElementById('apiKeyInput').value = savedKey;
      document.getElementById('apiKeyInput').oninput = function(e) {
        localStorage.setItem("gemini_api_key", e.target.value.trim());
      };

      // Calorie Targets setup
      document.getElementById('goalInput').oninput = function(e) {
        calorieGoal = parseInt(e.target.value) || 1800;
        localStorage.setItem("calorie_goal", calorieGoal);
        updateDOM();
      };
      calorieGoal = parseInt(localStorage.getItem("calorie_goal")) || 1800;
      document.getElementById('goalInput').value = calorieGoal;

      loadLog();
    }

    function changeDate(days) {
      var d = new Date(currentSelectedDate);
      d.setDate(d.getDate() + days);
      currentSelectedDate = d.toISOString().split('T')[0];
      loadLog();
    }

    function loadLog() {
      document.getElementById('currentDateDisplay').innerText = currentSelectedDate;
      
      // Smart Recovery Check: Tries old structural naming format OR new simplified naming layout
      var saved = localStorage.getItem("nutrition_log_" + currentSelectedDate) || localStorage.getItem("meals_" + currentSelectedDate);
      if (saved) {
        try {
          var parsed = JSON.parse(saved);
          meals = Array.isArray(parsed) ? parsed : (parsed.meals || []);
        } catch(e) { meals = []; }
      } else {
        meals = [];
      }
      updateDOM();
    }

    function updateDOM() {
      var container = document.getElementById('mealsListContainer');
      container.innerHTML = '';
      
      var totalCals = 0, p = 0, c = 0, f = 0;
      
      if (!meals.length) {
        container.innerHTML = '<div class="empty-state">No items logged today.</div>';
      } else {
        meals.forEach(function(m, index) {
          totalCals += (Number(m.calories) || 0);
          p += (Number(m.protein) || 0);
          c += (Number(m.carbs) || 0);
          f += (Number(m.fat) || 0);

          var item = document.createElement('div');
          item.className = "meal-item";
          item.innerHTML = `
            <div>
              <p style="font-size:13px; font-weight:700; color:#fff;">${m.name}</p>
              <p style="font-size:10px; color:#94a3b8;">P: ${m.protein || 0}g | C: ${m.carbs || 0}g | F: ${m.fat || 0}g</p>
            </div>
            <span style="font-size:12px; font-weight:700; color:#e2e8f0;">${m.calories} kcal</span>
          `;
          container.appendChild(item);
        });
      }

      document.getElementById('totalCalories').innerText = totalCals;
      var percent = Math.min((totalCals / calorieGoal) * 100, 100);
      document.getElementById('calorieProgressBar').style.strokeDashoffset = 440 - (440 * percent) / 100;

      // Render out Targets
      var targetP = Math.round((calorieGoal * 0.3) / 4);
      var targetC = Math.round((calorieGoal * 0.45) / 4);
      var targetF = Math.round((calorieGoal * 0.25) / 9);

      document.getElementById('proteinLabel').innerText = p + "g / " + targetP + "g";
      document.getElementById('proteinBar').style.width = Math.min((p / targetP) * 100, 100) + "%";
      
      document.getElementById('carbsLabel').innerText = c + "g / " + targetC + "g";
      document.getElementById('carbsBar').style.width = Math.min((c / targetC) * 100, 100) + "%";
      
      document.getElementById('fatLabel').innerText = f + "g / " + targetF + "g";
      document.getElementById('fatBar').style.width = Math.min((f / targetF) * 100, 100) + "%";
    }

    function saveQuickMeal() {
      var name = document.getElementById('recipeMealName').value.trim() || "Quick Entry";
      var cals = parseInt(document.getElementById('recipeCalories').value) || 0;
      
      // auto-estimate basic macros if adding manually
      var calculatedP = Math.round((cals * 0.25) / 4);
      var calculatedC = Math.round((cals * 0.50) / 4);
      var calculatedF = Math.round((cals * 0.25) / 9);

      meals.push({
        id: Date.now(),
        name: name,
        calories: cals,
        protein: calculatedP,
        carbs: calculatedC,
        fat: calculatedF
      });

      localStorage.setItem("nutrition_log_" + currentSelectedDate, JSON.stringify(meals));
      
      var index = JSON.parse(localStorage.getItem("history_index") || "[]");
      if(!index.includes(currentSelectedDate)) {
        index.push(currentSelectedDate);
        localStorage.setItem("history_index", JSON.stringify(index));
      }

      document.getElementById('addMealModal').classList.remove('active');
      document.getElementById('recipeMealName').value = '';
      document.getElementById('recipeCalories').value = '';
      updateDOM();
    }

    function openHistoryModal() {
      var container = document.getElementById('historyListContainer');
      container.innerHTML = '';
      var index = JSON.parse(localStorage.getItem("history_index") || "[]");
      
      if(!index.length) {
        container.innerHTML = '<div class="empty-state">No historical log entries found.</div>';
      }
      
      index.forEach(function(dateStr) {
        var div = document.createElement('div');
        div.style.padding = "10px";
        div.style.borderBottom = "1px solid #1e293b";
        div.style.cursor = "pointer";
        div.style.color = "#fff";
        div.innerText = dateStr;
        div.onclick = function() {
          currentSelectedDate = dateStr;
          loadLog();
          document.getElementById('historyModal').classList.remove('active');
        };
        container.appendChild(div);
      });
      document.getElementById('historyModal').classList.add('active');
    }

    window.onload = initApplication;
  </script>
</body>
</html>
